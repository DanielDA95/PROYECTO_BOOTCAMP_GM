<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EcoControl</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>EcoControl v1.0</h1>

      <div class="user-status"><span class="dot"></span> Sistema Online</div>
    </header>

    <main>
      <section id="estado-general">
        <h2>Estado General del Sistema</h2>
        <p>Monitorizacion de activos en tiempo real.</p>
      </section>

      <section id="controles">
        <h2>Panel de control</h2>
        <label for="selector-turbina">Seleccione una turbina</label>
        <select id="selector-turbina">
          <option value="opcion1">Turbina Alfa</option>
          <option value="optcion2">Turbina Beta</option>
          <option value="optcion3">Turbina Gamma</option>
        </select>
        <label for="input-rpm">Velocidad (RPM):</label>
        <input id="input-rpm" type="number" placeholder="RPM Deseadas" />
        <button class="btn-accion" id="btn-aplicar">Aplicar Velocidad</button>
      </section>
    </main>

    <footer>
      <p>&copy; 2025 EcoControl Systems - Bilbao, España</p>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
